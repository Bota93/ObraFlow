services:
  - type: web
    name: obraflow-api
    runtime: docker
    rootDir: backend
    dockerContext: ./backend
    dockerfilePath: ./backend/src/ObraFlow.Api/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000
      - key: ASPNETCORE_FORWARDEDHEADERS_ENABLED
        value: true
      - key: Database__ApplyMigrationsOnStartup
        value: true
      - key: DemoMode__EnableWriteRateLimiting
        value: true
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Cors__AllowedOrigins
        sync: false
