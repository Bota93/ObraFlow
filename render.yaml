services:
  - type: web
    name: obraflow-api
    runtime: docker
    rootDir: backend
    dockerContext: .
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000
      - key: ASPNETCORE_FORWARDEDHEADERS_ENABLED
        value: true
      - key: Database__ApplyMigrationsOnStartup
        value: false
      - key: Swagger__Enabled
        value: true
      - key: DemoMode__EnableWriteRateLimiting
        value: true
      - key: Cors__AllowedOrigins
        value: https://obraflow.adrianalcaraz.es,https://<project>.vercel.app
      - key: ConnectionStrings__DefaultConnection
        sync: false
